<style>

  .balancebar .track{flex:1;height:16px;background:#E7E2D6;border-radius:6px;overflow:hidden}.balancebar .track>span{display:block;height:100%;background:linear-gradient(90deg,var(--pine),var(--amber))}

  #gate,#busy{position:fixed;inset:0;display:none;align-items:center;justify-content:center;z-index:1000}

  .right{display:flex;justify-content:flex-end;gap:8px;margin-top:14px}
</style>

<script>
/* ============ CONFIG ============ */
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxPWYt6eHhArFgkOowdUTbwXkr9vT9HM_JBNzRnddv0B4W2_N4NvzuAS4WZSGJcTAw2Iw/exec";        // <-- paste your Apps Script /exec URL here for LIVE mode
let LEAD_CODE_PREVIEW = "1234";// preview-mode leadership code (live mode uses the server's LEAD_CODE)
let SITE_CODE = "1122";   // shared code to open the page; set to "" to disable the gate
let MAX_CONSECUTIVE = 4;       // most weeks anyone serves back-to-back before a forced rest
let HORIZON_WEEKS = 18;        // preview only: matches your sheet (5 Jul → 1 Nov)

/* ============ Role model ============ */
const ROLE_ORDER = ["Worship Leader","Co Worship Leader","Singer (M)","Singer (F)","Electric Gtr",
 "Acoustic Gtr","Bass","Piano","Keys","Violin","Drums","Drum Tech"];
const SECTIONS = [["Vocals",["Worship Leader","Co Worship Leader","Singer (M)","Singer (F)"]],
 ["Band",["Electric Gtr","Acoustic Gtr","Bass","Piano","Keys","Violin","Drums","Drum Tech"]]];
function resolveRole(r){const m=/^(.*?)\s*\((M|F)\)\s*$/.exec(r);return m?{key:m[1].trim(),gender:m[2]}:{key:r,gender:null};}
function eligible(mem,r){const {key,gender}=resolveRole(r);if(!(key in mem.skills))return false;if(gender&&mem.gender!==gender)return false;return true;}
function skillFor(mem,r){return mem.skills[resolveRole(r).key]||0;}

/* ============ Embedded demo data (your real worship team) ============ */
function demoMembers(){
  const M=(name,gender,r,md,sk,wt,mx,mdwt,pref)=>({name,gender,readiness:r,md,leader:false,skills:sk,
    weight:(wt&&wt>0)?wt:1, maxServes:(mx==null?null:mx), mdWt:(mdwt&&mdwt>0)?mdwt:1, preferredRole:pref||null});
  return [
   M("Reuel","M",4,false,{"Worship Leader":5,"Co Worship Leader":5,"Acoustic Gtr":5}),
   M("Darynn","F",4,false,{"Worship Leader":4,"Co Worship Leader":4}),
   M("Mark","M",3,false,{"Worship Leader":3,"Co Worship Leader":3}),
   M("Samson","M",5,false,{"Worship Leader":5,"Co Worship Leader":5,"Piano":5}),
   M("Cynthia","F",5,false,{"Worship Leader":3,"Co Worship Leader":3,"Singer":5}),
   M("Karyll","F",4,false,{"Singer":5}),M("Karynn","F",4,false,{"Singer":5}),M("Karmen","F",5,false,{"Singer":5}),
   M("Maxine","F",4,false,{"Singer":3}),M("Jing Jie","F",3,false,{"Singer":4}),M("Jo Ann","F",3,false,{"Singer":3}),
   M("Rehuel","F",3,false,{"Singer":3}),M("Noreen","F",2,false,{"Singer":3}),M("Sara Yow","F",2,false,{"Singer":3}),
   M("Zoe","F",4,false,{"Singer":3}),M("Sophia","F",3,false,{"Singer":4}),M("Celynn","F",2,false,{"Singer":3}),
   M("Chloe","F",2,false,{"Singer":3}),M("Hauii","M",4,false,{"Singer":5}),M("Dan Sim","M",3,false,{"Singer":4}),
   M("Nelly","M",3,false,{"Singer":4}),
   M("Wilson","M",5,true,{"Electric Gtr":5,"Acoustic Gtr":5},3,null,4),M("Hanson","M",4,true,{"Electric Gtr":5},3),
   M("Mun Choong","M",4,false,{"Electric Gtr":3},1,2),M("Morven","M",4,false,{"Electric Gtr":4},2),
   M("Winson","M",4,false,{"Electric Gtr":4,"Acoustic Gtr":5},2),
   M("Bennet","M",5,true,{"Piano":5,"Keys":5},1,null,3),M("Jeshua","M",4,false,{"Piano":3,"Keys":4}),
   M("Dan Kee","M",4,false,{"Keys":4}),M("Jon Ooi","M",4,false,{"Keys":3}),
   M("Karmen Wong","M",4,false,{"Bass":4},2),M("Nigel","M",4,false,{"Bass":5},3),M("Wei Han","M",5,true,{"Bass":4},1,1),
   M("Sara Kung","F",4,false,{"Violin":4}),M("Kylie","F",3,false,{"Violin":5},1,1),M("Kyvie","F",3,false,{"Violin":5},1,1),
   M("Wilfred","M",5,false,{"Drums":5,"Drum Tech":5}),M("Adrian","M",5,true,{"Drums":5,"Drum Tech":5},1,null,2),
   M("Andrew","M",4,false,{"Drums":4,"Drum Tech":5}),
  ];
}
function demoServices(){
  const base={"Worship Leader":1,"Co Worship Leader":1,"Singer (M)":1,"Singer (F)":3,"Electric Gtr":2,
   "Acoustic Gtr":1,"Bass":1,"Piano":1,"Keys":1,"Violin":1,"Drums":1,"Drum Tech":1};
  const out=[]; const d=new Date("2026-07-05T00:00:00");
  for(let i=0;i<HORIZON_WEEKS;i++){
    const req=Object.assign({},base,{"Violin": i%2===0 ? 1 : 0});  // sheet alternates violin week-to-week
    out.push({date:d.toISOString().slice(0,10),label:"Sunday Service",req});
    d.setDate(d.getDate()+7);
  }
  return out;
}
function demoBlackouts(){return {"Wei Han":{"2026-07-12":1,"2026-07-19":1},"Wilfred":{"2026-07-05":1,"2026-07-12":1,"2026-07-19":1}};}
function demoRoleCaps(){return [{name:"Wilson",role:"Acoustic Gtr",max:2,gap:8},{name:"Reuel",role:"Acoustic Gtr",max:2,gap:8}];}
function demoAvoid(){return [["Karyll","Karynn"]];}   // won't fill the same role on the same service

/* ============ Assignment engine (mirrors the Apps Script) ============ */
function generate(members,services,blackouts,locks,roleCaps,avoidPairs){
  locks=locks||{};
  const capMap={},gapMap={}; (roleCaps||[]).forEach(c=>{ if(c&&c.name&&c.role){ if(c.max!=null&&c.max!=='')capMap[c.name+'|'+c.role]=+c.max; if(c.gap!=null&&c.gap!=='')gapMap[c.name+'|'+c.role]=+c.gap; } });
  const avoid={}; (avoidPairs||[]).forEach(p=>{ if(p&&p[0]&&p[1]){ (avoid[p[0]]=avoid[p[0]]||new Set()).add(p[1]); (avoid[p[1]]=avoid[p[1]]||new Set()).add(p[0]); } });
  const roleServed={}, lastRoleIdx={};
  const byName={};members.forEach(m=>byName[m.name]=m);
  const served={},streak={};members.forEach(m=>{served[m.name]=0;streak[m.name]=0;});
  Object.values(locks).forEach(n=>{if(served[n]!=null)served[n]++;});
  const reqRoles=s=>Object.keys(s.req).filter(r=>s.req[r]>0);
  const lockedSlots=(date,role)=>{const res=[];Object.keys(locks).forEach(k=>{const p=k.split('|');if(p[0]===date&&p[1]===role)res[(+p[2])-1]=locks[k];});return res;};
  const lockedRolesFor=date=>{const set={};Object.keys(locks).forEach(k=>{const p=k.split('|');if(p[0]===date)set[p[1]]=1;});return Object.keys(set);};
  function cands(role,date,used,relax,idx,arr){
    return members.filter(m=>{
      if(!eligible(m,role))return false;
      if(blackouts[m.name]&&blackouts[m.name][date])return false;
      if(used.has(m.name))return false;
      if(!relax){
        if(streak[m.name]>=MAX_CONSECUTIVE)return false;                 // forced rest
        if(m.maxServes!=null&&served[m.name]>=m.maxServes)return false;  // global cap
        const cap=capMap[m.name+'|'+role]; if(cap!=null && (roleServed[m.name+'|'+role]||0)>=cap) return false;  // per-role cap
        const gap=gapMap[m.name+'|'+role]; const last=lastRoleIdx[m.name+'|'+role];
        if(gap && last!=null && idx!=null && (idx-last)<gap) return false;                                       // spread-out (min weeks between)
        if(avoid[m.name] && arr && arr.some(n=>n&&avoid[m.name].has(n))) return false;                           // avoid-together (same role)
      }
      return true;
    });
  }
  const pickSort=role=>(x,y)=>{
    const px=(x.preferredRole&&x.preferredRole!==role)?1:0, py=(y.preferredRole&&y.preferredRole!==role)?1:0;
    if(px!==py)return px-py;                                             // preferred-role people are last resort elsewhere
    const rx=served[x.name]/x.weight, ry=served[y.name]/y.weight;        // weighted fair load
    if(rx!==ry)return rx-ry;
    const sk=skillFor(y,role)-skillFor(x,role);if(sk)return sk;
    if(y.readiness!==x.readiness)return y.readiness-x.readiness;
    return x.name.localeCompare(y.name);
  };
  const sv=services.map(s=>{
    const rr=reqRoles(s); const allRoles=[...new Set([...rr,...lockedRolesFor(s.date)])];
    return {...s,_o:allRoles,_rr:rr,_a:{}};
  });
  let prevUsed=new Set();
  sv.forEach((s,idx)=>{
    const used=new Set(); s._o.forEach(r=>s._a[r]=[]);
    s._o.forEach(role=>{ lockedSlots(s.date,role).forEach((nm,i)=>{ if(nm){s._a[role][i]=nm;used.add(nm);roleServed[nm+'|'+role]=(roleServed[nm+'|'+role]||0)+1;lastRoleIdx[nm+'|'+role]=idx;} }); });  // pre-apply locks
    const ord=s._rr.slice().sort((a,b)=>cands(a,s.date,new Set(),false,idx,s._a[a]).length-cands(b,s.date,new Set(),false,idx,s._a[b]).length);
    ord.forEach(role=>{for(let slot=1;slot<=s.req[role];slot++){
      if(s._a[role][slot-1])continue;
      let pool=cands(role,s.date,used,false,idx,s._a[role]);
      if(!pool.length)pool=cands(role,s.date,used,true,idx,s._a[role]);   // relax to avoid a gap
      if(!pool.length){s._a[role][slot-1]=null;continue;}
      pool.sort(pickSort(role));
      const p=pool[0];s._a[role][slot-1]=p.name;used.add(p.name);served[p.name]++;roleServed[p.name+'|'+role]=(roleServed[p.name+'|'+role]||0)+1;lastRoleIdx[p.name+'|'+role]=idx;
    }});
    members.forEach(m=>{ if(used.has(m.name)) streak[m.name]=prevUsed.has(m.name)?streak[m.name]+1:1; else streak[m.name]=0; });
    prevUsed=used;
  });
  // balance pass (required slots only; locked picks are protected)
  const strength=s=>{let t=0;s._o.forEach(r=>s._a[r].forEach(n=>{if(n)t+=skillFor(byName[n],r);}));return t;};
  for(let it=0;it<8;it++){
    const srt=sv.slice().sort((a,b)=>strength(b)-strength(a));const hi=srt[0],lo=srt[srt.length-1];
    if(!hi||!lo||hi===lo)break;let diff=strength(hi)-strength(lo);if(diff<=1)break;let sw=false;
    for(const role of hi._rr){if(!lo._a[role])continue;
      for(let i=0;i<hi._a[role].length&&!sw;i++)for(let j=0;j<lo._a[role].length&&!sw;j++){
        const A=hi._a[role][i],B=lo._a[role][j];if(!A||!B)continue;
        if(locks[[hi.date,role,i+1].join('|')]||locks[[lo.date,role,j+1].join('|')])continue;
        if(blackouts[A]&&blackouts[A][lo.date])continue;if(blackouts[B]&&blackouts[B][hi.date])continue;
        if(!eligible(byName[B],role)||!eligible(byName[A],role))continue;
        if(hi._a[role].indexOf(B)>=0||lo._a[role].indexOf(A)>=0)continue;   // don't create a same-role duplicate
        if(lo._o.some(r=>r!==role&&lo._a[r].indexOf(A)>=0))continue;
        if(hi._o.some(r=>r!==role&&hi._a[r].indexOf(B)>=0))continue;
        const nd=Math.abs((strength(hi)-skillFor(byName[A],role)+skillFor(byName[B],role))-(strength(lo)-skillFor(byName[B],role)+skillFor(byName[A],role)));
        if(nd<diff){hi._a[role][i]=B;lo._a[role][j]=A;sw=true;}
      }
      if(sw)break;
    }
    if(!sw)break;
  }
  // MD weighted rotation
  const mdCount={};let lastMd=null;const out={};const md={};
  sv.forEach(s=>{
    const usedN=[];s._o.forEach(r=>s._a[r].forEach(n=>{if(n)usedN.push(n);}));
    const c=usedN.filter(n=>byName[n]&&byName[n].md);let pick=null;
    if(c.length){c.sort((a,b)=>{const ra=(mdCount[a]||0)/byName[a].mdWt,rb=(mdCount[b]||0)/byName[b].mdWt;if(ra!==rb)return ra-rb;
      const la=(a===lastMd)?1:0,lb=(b===lastMd)?1:0;if(la!==lb)return la-lb;
      if(byName[b].readiness!==byName[a].readiness)return byName[b].readiness-byName[a].readiness;return a.localeCompare(b);});
      pick=c[0];mdCount[pick]=(mdCount[pick]||0)+1;lastMd=pick;}
    out[s.date]=s._a;md[s.date]=pick;
  });
  return {assigned:out,md,served,mdCount,strength:Object.fromEntries(sv.map(s=>[s.date,strength(s)]))};
}

/* ============ State ============ */
let DATA={members:[],services:[],blackouts:{},locks:{},roleCaps:[],avoid:[]};
let RESULT=null;
let mode="member",activeTab="schedule",me=null,leadCode=null;
const LIVE=!!WEB_APP_URL;

async function api(action,params){
  const u=new URL(WEB_APP_URL);u.searchParams.set("action",action);
  Object.entries(params||{}).forEach(([k,v])=>u.searchParams.set(k,v));
  const r=await fetch(u);return r.json();
}
async function apiPost(body){
  const r=await fetch(WEB_APP_URL,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(body)});
  try{return await r.json();}catch(e){return {ok:true};}
}

function mapMembers_(list){ return list.map(x=>({...x,skills:x.skills||{},readiness:x.readiness||0,weight:(x.weight&&x.weight>0)?x.weight:1,maxServes:(x.maxServes==null?null:x.maxServes),mdWt:(x.mdWt&&x.mdWt>0)?x.mdWt:1})); }
async function boot(){
  showBusy("Loading roster…");
  if(LIVE){
    const m=await api("members",{});DATA.members=mapMembers_(m.members);
    const s=await api("schedule",{});buildFromServerRoster(s.roster);
  }else{
    DATA.members=demoMembers();DATA.services=demoServices();DATA.blackouts=demoBlackouts();DATA.locks={};DATA.roleCaps=demoRoleCaps();DATA.avoid=demoAvoid();
    RESULT=generate(DATA.members,DATA.services,DATA.blackouts,DATA.locks,DATA.roleCaps,DATA.avoid);
  }
  hideBusy();
  render();
}
// live: re-fetch team WITH the leadership code so skills/readiness/weights load, then rebuild + recompute stats
async function refreshLead(){
  try{
    const m=await api("members",{code:leadCode}); if(m&&m.members) DATA.members=mapMembers_(m.members);
    const s=await api("schedule",{}); buildFromServerRoster(s.roster);
  }catch(e){}
  render();
}
function buildFromServerRoster(rows){
  const dates=[...new Set(rows.map(r=>r.date))];
  DATA.services=dates.map(d=>({date:d,label:"",req:{}}));
  const idx={};DATA.services.forEach(s=>idx[s.date]=s);
  const assigned={},md={};
  rows.forEach(r=>{const a=assigned[r.date]=assigned[r.date]||{};(a[r.role]=a[r.role]||[])[r.slot-1]=r.name||null;
    idx[r.date].req[r.role]=Math.max(idx[r.date].req[r.role]||0,r.slot);if(r.md)md[r.date]=r.name;});
  // derive strength / fairness / MD counts from the roster + member skills (skills present only in lead mode)
  const byName={};DATA.members.forEach(m=>byName[m.name]=m);
  const served={},strength={},mdCount={};
  DATA.services.forEach(s=>{let t=0;const a=assigned[s.date]||{};
    Object.keys(a).forEach(role=>a[role].forEach(n=>{if(n){served[n]=(served[n]||0)+1; if(byName[n]&&byName[n].skills) t+=skillFor(byName[n],role);}}));
    strength[s.date]=t; if(md[s.date])mdCount[md[s.date]]=(mdCount[md[s.date]]||0)+1;});
  RESULT={assigned,md,served,strength,mdCount};
}

/* ============ Render ============ */
function render(){
  document.body.classList.toggle("is-lead",mode==="lead");
  modeDot.className="dot"+(mode==="lead"?" lead":"");
  modeLabel.textContent=mode==="lead"?"Leadership":"Member";
  liveLabel.innerHTML=LIVE?' · <span style="color:var(--sage)">live</span>':' · preview';
  modeToggle.textContent=mode==="lead"?"Exit":"Leadership";
  [...document.querySelectorAll("#tabs button")].forEach(b=>b.classList.toggle("active",b.dataset.tab===activeTab));
  const v=document.getElementById("view");
  v.innerHTML = activeTab==="schedule"?viewSchedule()
              : activeTab==="overview"?viewOverview()
              : activeTab==="me"?viewMe()
              : viewLead();
  foot.textContent = LIVE?"Live — reading and writing your Google Sheet via Apps Script."
    :"Preview — running in your browser on demo data. Set WEB_APP_URL to go live.";
  bind();
}
function prettyDate(d){const x=new Date(d+"T00:00:00");return x.toLocaleDateString(undefined,{weekday:'short',day:'numeric',month:'short'});}

function lineup(date,editable){
  const a=RESULT.assigned[date]||{};const md=RESULT.md[date];let h="";
  SECTIONS.forEach(([secName,roles])=>{
    const present=roles.filter(r=>a[r]&&a[r].length);if(!present.length)return;
    h+=`<div class="sec">${secName}</div>`;
    present.forEach(role=>{
      a[role].forEach((name,i)=>{
        const star=name&&name===md?' <span class="star">★MD</span>':'';
        h+=`<div class="slot"><span class="role">${role}</span><span class="who${name?'':' empty'}">${name?name+star:'— open —'}</span></div>`;

}
function viewSchedule(){

function prettyShort(d){const x=new Date(d+"T00:00:00");return x.toLocaleDateString(undefined,{day:'numeric',month:'short'});}

function viewOverview(){
  if(!DATA.services.length)return `<div class="card"><div class="help">No services yet.</div></div>`;

  const roleRow=role=>{
    const cells=DATA.services.map(s=>{

    }).join("");

  };

function myWeeks(name){
  return DATA.services.map(s=>{
    const a=RESULT.assigned[s.date]||{};let role=null;
    for(const r in a){ if((a[r]||[]).indexOf(name)>=0){role=r;break;} }
    return {date:s.date, role, away:!!(DATA.blackouts[name]&&DATA.blackouts[name][s.date]), md:RESULT.md[s.date]===name};
  });
}
function viewMe(){
  const names=DATA.members.map(m=>m.name).sort();

  const ovRoles=ROLE_ORDER.filter(r=>DATA.services.some(s=>(s.req[r]||0)>0));

  DATA.services.forEach(s=>{const c={};const a=RESULT.assigned[s.date]||{};

      let inner="";

  // clickable dot rating: filled up to val; click dot n to set n (clearable: click current to clear → 0/none)

    return h+`</span>`;
  };
  const ROLE_SORT=["Worship Leader","Co Worship Leader","Singer","Electric Gtr","Acoustic Gtr","Bass","Piano","Keys","Violin","Drums","Drum Tech"];
  const primIdx=m=>{const rs=(m.roles&&m.roles.length?m.roles:Object.keys(m.skills));let mi=99;rs.forEach(r=>{const i=ROLE_SORT.indexOf(r);if(i>=0&&i<mi)mi=i;});return mi;};

     <td>${dots(m.name,'Load Wt',m.weight,5,{amber:true})}</td>

      ${ed?`<button class="btn sm danger" data-capdel="${i}">✕</button>`:''}
    </div>`).join("") || '<div class="help">No per-role caps set.</div>';
  const avoidRows=(DATA.avoid||[]).map(p=>`<span class="chip">${p[0]} &nbsp;✕&nbsp; ${p[1]}</span>`).join(" ") || '<div class="help">No avoid pairs set.</div>';
  const capsCard=`<div class="card"><h2>Per-role caps &amp; spread</h2>
    <p class="sub"><b>Max</b> = times a person may fill that role this run. <b>Gap</b> = minimum weeks between their serves of it (blank = no spacing). Soft: relaxed only if a slot would otherwise be empty.${ed?'':' Managed in the sheet\'s <b>Role Caps</b> tab (Name / Role / Max / Gap).'}</p>
    ${capRows}
    ${ed?'<div style="margin-top:8px"><button class="btn ghost sm" id="capAdd">+ Add cap</button></div>':''}
    <div class="sec" style="margin-top:14px">Avoid together <span style="font-weight:400;color:var(--muted)">— won't fill the same role on one service</span></div>
    <div style="margin-top:6px">${avoidRows}</div>
    ${ed?'':'<p class="help" style="margin-top:6px">Managed in the sheet\'s <b>Avoid Together</b> tab (two name columns).</p>'}</div>`;
  return `<div class="card"><h2>Generate &amp; balance</h2>
    ${previewControls}
    <div style="display:flex;gap:8px;margin-bottom:10px">
      <button class="btn amber" id="gen">⚡ Generate</button>
      <button class="btn ghost" id="clr">Clear locks</button></div>
    <div class="sec">Team strength balance</div>${bars}
    <div class="sec" style="margin-top:10px">Load fairness (times serving)</div><div class="chips">${fairChips}</div>
    <div class="sec" style="margin-top:10px">MD turns</div><div class="chips">${mdChips}</div>
  </div>
  ${capsCard}
  <div class="card"><h2>Manual override</h2><p class="sub">Roles down, weeks across. Change any slot; 🔒 keeps it on regenerate. <b>⚠ red = same person twice on a service, or assigned while unavailable</b> (allowed, just flagged). ⚠away marks unavailable people in the dropdown.</p>
    ${overrideGrid}</div>
  <div class="card"><h2>Team — readiness &amp; weights</h2>
    <p class="sub">Click the dots to edit. Readiness / Load Wt / MD Wt are 1–5; Max is a cap (click a set dot again to clear → no cap). Changes save to the sheet${ed?'':' live'}; press <b>Generate</b> to apply them to the roster.</p>
    <table><thead><tr><th>Name</th><th>G</th><th>MD</th><th>Roles</th><th>Readiness</th><th>Load Wt</th><th>Max</th><th>MD Wt</th></tr></thead><tbody>${team}</tbody></table></div>`;
}

/* ============ Actions ============ */
function regen(){RESULT=generate(DATA.members,DATA.services,DATA.blackouts,DATA.locks,DATA.roleCaps,DATA.avoid);}
function bind(){
  const meSel=document.getElementById("meSel");if(meSel)meSel.onchange=e=>{me=e.target.value||null;render();};
  const weeks=document.getElementById("weeks");if(weeks)weeks.onchange=e=>{HORIZON_WEEKS=+e.target.value;DATA.services=demoServices();DATA.locks={};regen();render();};
  const maxc=document.getElementById("maxc");if(maxc)maxc.onchange=e=>{MAX_CONSECUTIVE=+e.target.value;regen();render();};
  const setWt=(attr,key)=>document.querySelectorAll(`[data-${attr}]`).forEach(inp=>inp.onchange=()=>{
    const m=DATA.members.find(x=>x.name===inp.dataset[attr]);if(!m)return;
    const v=inp.value===''?null:Number(inp.value);
    if(key==='maxServes')m.maxServes=(v==null||isNaN(v))?null:v;
    else m[key]=(v&&v>0)?v:1;
    regen();render();
  });
  document.querySelectorAll("[data-rate]").forEach(el=>el.onclick=async()=>{
    const p=el.dataset.rate.split('|'); const name=p[0], field=p[1], idx=+p[2], clearable=p[3]==='1';
    const m=DATA.members.find(x=>x.name===name); if(!m)return;
    const cur = field==='Readiness'?m.readiness : field==='Load Wt'?m.weight : field==='MD Wt'?m.mdWt : (m.maxServes==null?0:m.maxServes);
    let nv=idx; if(clearable && idx===cur) nv=0;     // click the current value to clear
    if(field==='Readiness') m.readiness=nv;
    else if(field==='Load Wt') m.weight=nv||1;
    else if(field==='MD Wt') m.mdWt=nv||1;
    else if(field==='Max Serves') m.maxServes = nv===0?null:nv;
    if(!LIVE) regen();
    render();                                                   // react immediately
    if(LIVE) apiPost({action:'member',code:leadCode,name:name,field:field,value:(field==='Max Serves'&&nv===0)?'':nv}).catch(()=>{});
  });
  document.querySelectorAll("[data-cap]").forEach(el=>el.onchange=()=>{
    const i=+el.dataset.cap, f=el.dataset.capfield;
    if(!DATA.roleCaps[i])return;
    DATA.roleCaps[i][f] = (f==='max'||f==='gap') ? (el.value===''?'':+el.value) : el.value;
    regen();render();
  });
  document.querySelectorAll("[data-capdel]").forEach(b=>b.onclick=()=>{ DATA.roleCaps.splice(+b.dataset.capdel,1); regen();render(); });
  const capAdd=document.getElementById("capAdd");if(capAdd)capAdd.onclick=()=>{
    const firstName=DATA.members.map(m=>m.name).sort()[0]||"";
    DATA.roleCaps.push({name:firstName,role:"Acoustic Gtr",max:2}); regen();render();
  };
  document.querySelectorAll("[data-black]").forEach(c=>c.onclick=()=>{
    if(!me)return;const d=c.dataset.black;DATA.blackouts[me]=DATA.blackouts[me]||{};
    const on=DATA.blackouts[me][d];
    if(on)delete DATA.blackouts[me][d];else DATA.blackouts[me][d]=1;
    if(!LIVE)regen();
    render();                                                   // react immediately
    if(LIVE)apiPost({action:"blackout",name:me,date:d,op:on?"remove":"add"}).catch(()=>{}); // save in background
  });
  const gen=document.getElementById("gen");if(gen)gen.onclick=async()=>{
    if(LIVE){
      showBusy("Generating roster…");
      try{ await apiPost({action:"generate",code:leadCode}); const s=await api("schedule",{}); buildFromServerRoster(s.roster); }
      catch(e){}
      hideBusy();
    } else regen();
    render();
  };
  const clr=document.getElementById("clr");if(clr)clr.onclick=()=>{DATA.locks={};if(!LIVE)regen();render();};
  document.querySelectorAll("[data-assign]").forEach(sel=>sel.onchange=()=>{
    const [d,role,slot]=sel.dataset.assign.split("|");
    const a=RESULT.assigned[d]||(RESULT.assigned[d]={});a[role]=a[role]||[];a[role][+slot-1]=sel.value||null;
    render();                                                   // react immediately
    if(LIVE)apiPost({action:"override",code:leadCode,date:d,role,slot:+slot,name:sel.value}).catch(()=>{});
  });
  document.querySelectorAll("[data-lock]").forEach(b=>b.onclick=()=>{
    const key=b.dataset.lock;const [d,role,slot]=key.split("|");
    const name=((RESULT.assigned[d]||{})[role]||[])[+slot-1];if(!name)return;
    if(DATA.locks[key])delete DATA.locks[key];else DATA.locks[key]=name;
    render();
    if(LIVE)apiPost({action:"override",code:leadCode,date:d,role,slot:+slot,locked:!!DATA.locks[key]}).catch(()=>{});
  });
}

/* ============ Shell ============ */
document.getElementById("tabs").onclick=e=>{const b=e.target.closest("button");if(!b)return;activeTab=b.dataset.tab;render();};
function openLeadDialog(initialErr){
  const d=document.getElementById("dlg");
  d.innerHTML=`<h2 style="font-family:var(--disp);margin:0 0 8px">Leadership access</h2>
    <p class="help" style="margin:0 0 10px">${LIVE?'Enter your leadership code.':'Preview code: 1234'}</p>
    <input id="lc" type="password" placeholder="Code" autofocus>
    <div id="lcerr" class="help" style="color:var(--clay);min-height:15px"></div>
    <div class="right"><button class="btn ghost" id="lcCancel">Cancel</button><button class="btn" id="lcGo">Unlock</button></div>`;
  d.showModal();
  const err=msg=>{ d.querySelector("#lcerr").textContent=msg||""; };
  if(initialErr) err(initialErr);
  const go=async()=>{
    const pin=d.querySelector("#lc").value;
    if(!LIVE){
      if(pin===LEAD_CODE_PREVIEW){ mode="lead"; activeTab="leadership"; d.close(); render(); }
      else err("Wrong code.");
      return;
    }
    // validate first — keep the dialog open so a wrong code shows instantly
    err(""); const btn=d.querySelector("#lcGo"); btn.disabled=true; btn.textContent="Checking…";
    let m=null;
    try{ m=await api("members",{code:pin}); }catch(e){ btn.disabled=false; btn.textContent="Unlock"; err("Couldn't reach the server — try again."); return; }
    if(!m || !m.lead){ btn.disabled=false; btn.textContent="Unlock"; err("Wrong code."); return; }
    // correct: enter the Leadership tab, then load behind the spinner
    leadCode=pin; mode="lead"; activeTab="leadership"; d.close(); render(); showBusy("Loading…");
    try{
      DATA.members=mapMembers_(m.members);
      const s=await api("schedule",{}); buildFromServerRoster(s.roster);
    }catch(e){}
    hideBusy(); render();
  };
  d.querySelector("#lcGo").onclick=go;
  d.querySelector("#lc").addEventListener("keydown",e=>{ if(e.key==="Enter"){ e.preventDefault(); go(); } });
  d.querySelector("#lcCancel").onclick=()=>d.close();
  setTimeout(()=>{ const i=d.querySelector("#lc"); if(i) i.focus(); }, 30);
}
document.getElementById("modeToggle").onclick=()=>{
  if(mode==="lead"){mode="member";if(activeTab==="leadership")activeTab="schedule";render();return;}
  openLeadDialog();
};
document.getElementById("settingsBtn").onclick=()=>{
  const d=document.getElementById("dlg");
  d.innerHTML=`<h2 style="font-family:var(--disp);margin:0 0 8px">Connection</h2>
    <p class="help" style="margin:0 0 12px">${LIVE?'Connected to your Apps Script web app.':'Preview mode. To go live, set the WEB_APP_URL constant at the top of this file to your Apps Script /exec URL, then host on GitHub Pages.'}</p>
    <div class="right"><button class="btn" id="dc">Close</button></div>`;
  d.showModal();d.querySelector("#dc").onclick=()=>d.close();
};
function showBusy(msg){const b=document.getElementById("busy");document.getElementById("busymsg").textContent=msg||"Working…";b.style.display="flex";}
function hideBusy(){document.getElementById("busy").style.display="none";}
function gateOk(){ try{return sessionStorage.getItem("ss_gate")===SITE_CODE;}catch(e){return false;} }
function bindGate(){
  const go=()=>{ const v=document.getElementById("gatein").value;
    if(v===SITE_CODE){ try{sessionStorage.setItem("ss_gate",v);}catch(e){} document.getElementById("gate").style.display="none"; boot(); }
    else document.getElementById("gateerr").textContent="Wrong code.";
  };
  const b=document.getElementById("gatego");
  b.onclick=go;
  document.getElementById("gatein").addEventListener("keydown",e=>{if(e.key==="Enter")go();});
}
function startApp(){
  bindGate();
  if(SITE_CODE && !gateOk()) document.getElementById("gate").style.display="flex";  // show gate
  else boot();
}
startApp();
</script>
